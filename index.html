<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Basic Chating</title>
  <link rel="stylesheet" href="style.css">
  <!-- Elfsight AI Chatbot | Untitled AI Chatbot -->
<script src="https://elfsightcdn.com/platform.js" async></script>
<div class="elfsight-app-e694daf9-7143-4347-9b28-e1421151b3aa" data-elfsight-app-lazy></div>
</head>
<body>
  <div class="chat-container">
    <!--Name of the chat room-->
    <div class="chat-header">
      Sieheng
    </div>
    <!--This is where the messages appear-->
    <div class="chat-messages" id="chatMessages">
      <div class="message other">
        Hello, I am the sieheng
      </div>
      <div class="message user">
        Well nice to meet you sieheng.
      </div>
    </div>
    <!--Where the chat box is located-->
    <div class="chat-input-area">
      <input id="chatInput" type="text" placeholder="Type a message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
